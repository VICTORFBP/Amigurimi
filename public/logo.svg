    <path d="M 18 55 Q 50 85 82 55" stroke="#be185d" stroke-width="4" stroke-linecap="round" fill="none" opacity="0.6"/>
    <path d="M 35 23 Q 45 55 55 23" stroke="#be185d" stroke-width="4" stroke-linecap="round" fill="none" opacity="0.6"/>
    <path d="M 25 70 Q 50 45 75 70" stroke="#be185d" stroke-width="4" stroke-linecap="round" fill="none" opacity="0.6"/>
    <path d="M 40 88 Q 50 50 60 88" stroke="#be185d" stroke-width="4" stroke-linecap="round" fill="none" opacity="0.6"/>
  </g>
  <!-- Text -->
  <text x="105" y="66" font-family="'Outfit', sans-serif" font-weight="800" font-size="46" fill="#1e293b" letter-spacing="-1">amigurumi</text>
