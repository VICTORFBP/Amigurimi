      <stop offset="0%" stop-color="#f472b6" />
      <stop offset="100%" stop-color="#db2777" />
    </linearGradient>
  </defs>
  <!-- Yarn Ball Icon -->
  <g transform="translate(10, 5) scale(0.9)">
    <!-- Ears -->
    <path d="M 25 40 L 15 15 L 45 25 Z" fill="url(#yarnGrad)" />
    <path d="M 75 40 L 85 15 L 55 25 Z" fill="url(#yarnGrad)" />
